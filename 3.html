
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bandeiras Simples</title>
<style>
  
/* Bandeira França */
.franca { width: 300px; height: 200px; }
.franca .azul { float: left; width: 100px; height: 200px; background: blue; }
.franca .branco { float: left; width: 100px; height: 200px; background: white; }
.franca .vermelho { float: left; width: 100px; height: 200px; background: red; }

/* Bandeira Alemanha */
.alemanha { width: 300px; height: 200px; }
.alemanha .preto { width: 300px; height: 66px; background: black; }
.alemanha .vermelho { width: 300px; height: 66px; background: red; }
.alemanha .amarelo { width: 300px; height: 68px; background: gold; }

/* Bandeira Japão */
.japao { width: 300px; height: 200px; background: white; position: relative; }
.japao .bola { width: 80px; height: 80px; background: red; border-radius: 50%; position: absolute; top: 60px; left: 110px; }
</style>
</head>
<body>

<!-- França -->
<div class="franca">
  <div class="azul"></div>
  <div class="branco"></div>
  <div class="vermelho"></div>
</div>

<!-- Alemanha -->
<div class="alemanha">
  <div class="preto"></div>
  <div class="vermelho"></div>
  <div class="amarelo"></div>
</div>

<!-- Japão -->
<div class="japao">
  <div class="bola"></div>
</div>

</body>
</html>
