<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo CSS - Estrutura e Sintaxe</title>
    <style>
        /* Regra CSS básica */
        p {
            color: blue;
            font-size: 16px;
        }

        /* Pseudo-classe */
        button:hover {
            background-color: green;
            color: white;
        }

        /* Pseudo-elemento */
        p::first-letter {
            font-size: 24px;
            font-weight: bold;
        }

        /* Animação */
        @keyframes mudarCor {
            from { background-color: red; }
            to { background-color: yellow; }
        }

        .animacao {
            animation: mudarCor 2s infinite alternate;
            padding: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <p>Exemplo de parágrafo com pseudo-elemento.</p>
    <button class="animacao">Passe o mouse aqui</button>
        
    </style>
</head>
<body>

   
</body>
</html>
