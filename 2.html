        <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CSS - Estrutura e Sintaxe</title>

    <style>
        /* Regra CSS */
        p {
            color: blue;
            font-size: 16px;
        }

        /* Pseudo-classe */
        button:hover {
            background-color: green;
            color: white;
        }

        /* Pseudo-elemento */
        p::first-letter {
            font-size: 24px;
            font-weight: bold;
        }

        /* Animação */
        @keyframes mudarCor {
            from {
                background-color: red;
            }
            to {
                background-color: yellow;
            }
        }

        .animacao {
            animation: mudarCor 2s infinite alternate;
            padding: 10px;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Estrutura do CSS</h1>

    <p>
        Uma regra CSS é composta por um seletor e um bloco de declarações.
        Dentro desse bloco existem propriedades e valores.
    </p>

    <p>
        Exemplo: o seletor é "p", a propriedade é "color" e o valor é "blue".
    </p>

    <button class="animacao">Passe o mouse aqui</button>

</body>
</html>
